<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Trip Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 600; }
    .logout-btn {
      font-size: 13px; color: #888;
      background: none; border: none; cursor: pointer; padding: 4px 8px;
    }

    /* ── Login ── */
    #login-screen {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .login-card {
      background: #1a1a1a; border-radius: 16px;
      padding: 32px 24px; width: 100%; max-width: 400px;
    }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: #888; margin-bottom: 24px; }
    .field-label { font-size: 13px; color: #aaa; margin-bottom: 6px; display: block; }
    .field-input {
      width: 100%; background: #252525; border: 1px solid #333;
      border-radius: 10px; padding: 12px 14px; color: #e8e8e8;
      font-size: 15px; margin-bottom: 16px; outline: none;
    }
    .field-input:focus { border-color: #3a8fbf; }
    .field-hint { font-size: 12px; color: #666; margin-top: -10px; margin-bottom: 16px; }
    .btn-primary {
      width: 100%; background: #3a8fbf; color: white; border: none;
      border-radius: 10px; padding: 14px; font-size: 16px;
      font-weight: 600; cursor: pointer;
    }
    .login-error { color: #e05555; font-size: 13px; margin-top: 12px; }

    /* ── Chat ── */
    #chat-screen {
      display: none; flex: 1; flex-direction: column; overflow: hidden;
    }

    .messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .msg {
      max-width: 82%; padding: 11px 14px;
      border-radius: 18px; font-size: 15px; line-height: 1.5;
    }
    .msg-bot {
      background: #1e1e1e; border: 1px solid #2a2a2a;
      align-self: flex-start; border-bottom-left-radius: 4px;
    }
    .msg-user {
      background: #1a3a5c; align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg-system {
      background: #1a2a1a; border: 1px solid #2a4a2a;
      align-self: center; text-align: center; font-size: 13px;
      color: #6ab86a; border-radius: 10px; max-width: 90%;
    }
    .msg-error {
      background: #2a1a1a; border: 1px solid #5a2a2a;
      align-self: center; text-align: center; font-size: 13px;
      color: #e05555; border-radius: 10px; max-width: 90%;
    }

    .preview-card {
      background: #1a2535; border: 1px solid #2a4a6a;
      border-radius: 12px; padding: 12px 14px; margin-top: 6px;
      font-size: 14px; line-height: 2;
    }
    .preview-row { display: flex; gap: 10px; }
    .preview-label { color: #7a9ab8; min-width: 80px; }
    .preview-val { color: #e8e8e8; }

    /* ── Quick replies ── */
    .quick-replies {
      padding: 6px 14px 4px; display: flex;
      flex-wrap: wrap; gap: 8px; flex-shrink: 0;
    }
    .qr-btn {
      background: #1a2535; border: 1px solid #3a8fbf;
      color: #3a8fbf; border-radius: 20px; padding: 8px 16px;
      font-size: 14px; cursor: pointer; white-space: nowrap;
    }
    .qr-btn:active { background: #2a4a6a; }

    /* ── Text input ── */
    .input-area {
      padding: 6px 12px 16px; display: flex;
      gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .chat-input {
      flex: 1; background: #1a1a1a; border: 1px solid #333;
      border-radius: 20px; padding: 10px 16px; color: #e8e8e8;
      font-size: 15px; outline: none; resize: none;
      max-height: 100px; line-height: 1.4; font-family: inherit;
    }
    .chat-input:focus { border-color: #3a8fbf; }
    .send-btn {
      background: #3a8fbf; border: none; border-radius: 50%;
      width: 40px; height: 40px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; flex-shrink: 0;
    }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    .restart-area {
      padding: 0 16px 6px; display: flex;
      justify-content: center; flex-shrink: 0;
    }
    .restart-btn {
      background: none; border: 1px solid #2a2a2a; color: #666;
      border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer;
    }

    /* ── Typing indicator ── */
    .typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
    .typing span {
      width: 7px; height: 7px; background: #555; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">✈️ Trip Editor</span>
  <button class="logout-btn" onclick="doLogout()">Log out</button>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">Martens Trips</div>
    <div class="login-sub">Sign in to update the itinerary</div>

    <label class="field-label">Password</label>
    <input class="field-input" type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">

    <label class="field-label">GitHub Token</label>
    <input class="field-input" type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    <div class="field-hint">Your personal access token — stored on this device only</div>

    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="messages" id="messages"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="restart-area" id="restart-area" style="display:none">
    <button class="restart-btn" onclick="restart()">↩ Start over</button>
  </div>
  <div class="input-area" id="input-area" style="display:none">
    <textarea class="chat-input" id="chat-input" placeholder="Type here..." rows="1"></textarea>
    <button class="send-btn" onclick="sendText()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const REPO = 'ianmartens-1513/vacation-itineraries';
const API  = 'https://api.github.com';
const PW   = 'Martens2026';

const TRIPS = {
  'Montana 2026': 'data/montana-2026.txt',
  'Greece 2026':  'data/greece-2026.txt'
};

const EVENT_TYPES = [
  { label: 'Flight ✈️',    value: 'flight' },
  { label: 'Hotel 🏨',     value: 'hotel' },
  { label: 'Dinner 🍽️',   value: 'dinner' },
  { label: 'Activity 🎯',  value: 'activity' },
  { label: 'Drive 🚙',     value: 'drive' },
  { label: 'Tour 🏛️',     value: 'tour' },
  { label: 'Beach 🏖️',    value: 'beach' },
  { label: 'Drinks 🥂',   value: 'drinks' },
  { label: 'Coffee ☕',    value: 'coffee' },
  { label: 'Car 🚗',       value: 'car' },
  { label: 'Taxi 🚐',      value: 'taxi' },
  { label: 'Wedding 💒',   value: 'wedding' },
  { label: 'Other 📌',     value: 'event' }
];

// ── State ──────────────────────────────────────────────
let s = {};

function resetState() {
  s = {
    step: 'SELECT_TRIP',
    trip: null, tripFile: null,
    tripContent: null, tripSha: null,
    days: [],
    day: null, dayLineIndex: null,
    type: null, typeLabel: null,
    label: null, time: null,
    details: null, confirm: null,
    removeLineIndex: null
  };
}

// ── Auth ───────────────────────────────────────────────
function getToken() { return localStorage.getItem('gh_token') || ''; }

function doLogin() {
  const pw    = document.getElementById('pw-input').value.trim();
  const token = document.getElementById('token-input').value.trim();
  const err   = document.getElementById('login-error');
  if (pw !== PW)  { err.textContent = 'Incorrect password.'; return; }
  if (!token)     { err.textContent = 'Please enter your GitHub token.'; return; }
  localStorage.setItem('gh_auth',  'true');
  localStorage.setItem('gh_token', token);
  showChat();
}

function doLogout() {
  localStorage.removeItem('gh_auth');
  localStorage.removeItem('gh_token');
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value    = '';
  document.getElementById('token-input').value = '';
  document.getElementById('login-error').textContent = '';
}

function showChat() {
  document.getElementById('login-screen').style.display = 'none';
  const cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';
  cs.style.flexDirection = 'column';
  resetState();
  clearMessages();
  botSay("Hey! Which trip do you want to update?");
  showQuickReplies(Object.keys(TRIPS).map(t => ({ label: t, value: t })));
}

// ── UI helpers ─────────────────────────────────────────
function clearMessages() {
  document.getElementById('messages').innerHTML = '';
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function botSay(html, delay) {
  if (delay === undefined) delay = 320;
  return new Promise(resolve => {
    const typing = document.createElement('div');
    typing.className = 'msg msg-bot';
    typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    document.getElementById('messages').appendChild(typing);
    scrollBottom();
    setTimeout(() => {
      typing.innerHTML = html;
      scrollBottom();
      resolve();
    }, delay);
  });
}

function userSay(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-user';
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function systemMsg(text, isError) {
  const el = document.createElement('div');
  el.className = isError ? 'msg msg-error' : 'msg msg-system';
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function showQuickReplies(options) {
  const qr = document.getElementById('quick-replies');
  const ia = document.getElementById('input-area');
  const ra = document.getElementById('restart-area');
  qr.innerHTML = '';
  ia.style.display = 'none';
  ra.style.display = s.step !== 'SELECT_TRIP' ? 'flex' : 'none';
  options.forEach(function(opt) {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt.label;
    btn.onclick = function() { handleQuickReply(opt.value, opt.label); };
    qr.appendChild(btn);
  });
}

function showTextInput(placeholder) {
  document.getElementById('quick-replies').innerHTML = '';
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('restart-area').style.display = 'flex';
  const inp = document.getElementById('chat-input');
  inp.placeholder = placeholder || 'Type here...';
  inp.value = '';
  inp.style.height = '';
  setTimeout(function() { inp.focus(); }, 100);
}

function showTextInputWithSkip(placeholder) {
  showTextInput(placeholder);
  const btn = document.createElement('button');
  btn.className = 'qr-btn';
  btn.textContent = 'Skip';
  btn.onclick = function() { handleQuickReply('__skip__', 'Skip'); };
  document.getElementById('quick-replies').appendChild(btn);
}

function hideInputs() {
  document.getElementById('quick-replies').innerHTML = '';
  document.getElementById('input-area').style.display = 'none';
  document.getElementById('restart-area').style.display = 'none';
}

// ── Input handling ─────────────────────────────────────
function sendText() {
  const inp = document.getElementById('chat-input');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  inp.style.height = '';
  userSay(val);
  hideInputs();
  processInput(val, val);
}

function handleQuickReply(value, label) {
  userSay(value === '__skip__' ? 'Skip' : label);
  hideInputs();
  processInput(value, label);
}

const SKIP_WORDS = ['skip','nope','nop','no','none','n/a','na','nothing','pass','-','–'];
function isSkip(val) {
  return val === '__skip__' || SKIP_WORDS.indexOf(val.toLowerCase().trim()) !== -1;
}

function restart() {
  resetState();
  clearMessages();
  botSay("Sure! Which trip do you want to update?");
  showQuickReplies(Object.keys(TRIPS).map(function(t) { return { label: t, value: t }; }));
}

// ── State machine ──────────────────────────────────────
async function processInput(value, label) {
  switch (s.step) {

    case 'SELECT_TRIP': {
      s.trip     = value;
      s.tripFile = TRIPS[value];
      await botSay('Loading trip…', 200);
      const ok = await loadTrip();
      if (!ok) return;
      s.step = 'SELECT_ACTION';
      await botSay('Got it! What do you want to do?');
      showQuickReplies([
        { label: 'Add an event',    value: 'add' },
        { label: 'Remove an event', value: 'remove' }
      ]);
      break;
    }

    case 'SELECT_ACTION': {
      if (value === 'add') {
        s.step = 'SELECT_DAY';
        await botSay('Which day do you want to add it to?');
        showQuickReplies(s.days.map(function(d) { return { label: d.short, value: String(d.lineIndex) }; }));
      } else {
        s.step = 'SELECT_DAY_REMOVE';
        await botSay('Which day has the event you want to remove?');
        showQuickReplies(s.days.map(function(d) { return { label: d.short, value: String(d.lineIndex) }; }));
      }
      break;
    }

    case 'SELECT_DAY': {
      const li = parseInt(value);
      s.day = s.days.find(function(d) { return d.lineIndex === li; });
      s.dayLineIndex = li;
      s.step = 'SELECT_TYPE';
      await botSay('Adding to <strong>' + s.day.short + '</strong>. What type of event is it?');
      showQuickReplies(EVENT_TYPES.map(function(t) { return { label: t.label, value: t.value }; }));
      break;
    }

    case 'SELECT_TYPE': {
      s.type      = value;
      s.typeLabel = label;
      s.step = 'GET_LABEL';
      await botSay("What's the name or title of the event?");
      showTextInput('e.g. Dinner at Taverna Klimataria');
      break;
    }

    case 'GET_LABEL': {
      s.label = value;
      s.step  = 'GET_TIME';
      await botSay('What time does it start? (or tap Skip)');
      showTextInputWithSkip('e.g. 7:30 PM');
      break;
    }

    case 'GET_TIME': {
      s.time = isSkip(value) ? null : value;
      s.step = 'GET_DETAILS';
      await botSay('Any extra details? (or tap Skip)');
      showTextInputWithSkip('e.g. Meet at lobby, reservation under Martens');
      break;
    }

    case 'GET_DETAILS': {
      s.details = isSkip(value) ? null : value;
      s.step    = 'GET_CONFIRM';
      await botSay('Any confirmation number? (or tap Skip)');
      showTextInputWithSkip('e.g. ABC123');
      break;
    }

    case 'GET_CONFIRM': {
      s.confirm = isSkip(value) ? null : value;
      s.step    = 'PREVIEW';
      await showPreview();
      break;
    }

    case 'PREVIEW': {
      if (value === 'yes') {
        await saveEvent();
      } else {
        restart();
      }
      break;
    }

    case 'SELECT_DAY_REMOVE': {
      const li2     = parseInt(value);
      s.day          = s.days.find(function(d) { return d.lineIndex === li2; });
      s.dayLineIndex = li2;
      const events   = getEventsForDay(li2);
      if (events.length === 0) {
        await botSay("That day doesn't have any events to remove. Try a different day.");
        showQuickReplies(s.days.map(function(d) { return { label: d.short, value: String(d.lineIndex) }; }));
      } else {
        s.step = 'SELECT_EVENT_REMOVE';
        await botSay('Which event on <strong>' + s.day.short + '</strong> do you want to remove?');
        showQuickReplies(events.map(function(e) { return { label: e.label, value: String(e.lineIndex) }; }));
      }
      break;
    }

    case 'SELECT_EVENT_REMOVE': {
      s.removeLineIndex = parseInt(value);
      const ev = getEventsForDay(s.dayLineIndex).find(function(e) { return e.lineIndex === s.removeLineIndex; });
      s.step = 'CONFIRM_REMOVE';
      await botSay('Remove "<strong>' + (ev ? ev.label : 'this event') + '</strong>"? This can\'t be undone.');
      showQuickReplies([
        { label: '🗑️ Yes, remove it', value: 'yes' },
        { label: 'Cancel', value: 'cancel' }
      ]);
      break;
    }

    case 'CONFIRM_REMOVE': {
      if (value === 'yes') {
        await removeEvent();
      } else {
        restart();
      }
      break;
    }
  }
}

// ── Trip loading ───────────────────────────────────────
async function loadTrip() {
  try {
    const res = await fetch(
      API + '/repos/' + REPO + '/contents/' + s.tripFile,
      { headers: { Authorization: 'token ' + getToken(), Accept: 'application/vnd.github.v3+json' } }
    );
    if (!res.ok) {
      const err = await res.json();
      systemMsg('Load failed: ' + err.message, true);
      return false;
    }
    const data    = await res.json();
    s.tripSha     = data.sha;
    s.tripContent = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    parseDays();
    return true;
  } catch (e) {
    systemMsg('Network error: ' + e.message, true);
    return false;
  }
}

function parseDays() {
  const lines = s.tripContent.split('\n');
  s.days = [];
  lines.forEach(function(line, i) {
    if (!line.startsWith('DAY:')) return;
    const parts = line.slice(4).split('|').map(function(p) { return p.trim(); });
    const date  = parts[0] || '';
    const name  = (parts[1] || '').replace(/^[A-Za-z]+ — /, '');
    s.days.push({ lineIndex: i, short: date + ' — ' + name, date: date, name: name });
  });
}

function getEventsForDay(dayLineIndex) {
  const lines  = s.tripContent.split('\n');
  const events = [];
  let inDay    = false;
  for (let i = 0; i < lines.length; i++) {
    if (i === dayLineIndex) { inDay = true; continue; }
    if (!inDay) continue;
    const line = lines[i].trim();
    if (!line) continue;
    if (/^(DAY|PHASE|TITLE|SUBTITLE|STAT):/.test(line)) break;
    if (line === '---') continue;
    const ci = line.indexOf(':');
    if (ci > 0) {
      const after = line.slice(ci + 1).trim();
      const pi    = after.indexOf('|');
      const lbl   = pi > 0 ? after.slice(0, pi).trim() : after;
      events.push({ lineIndex: i, label: lbl || line });
    }
  }
  return events;
}

// ── Preview ────────────────────────────────────────────
async function showPreview() {
  const iconObj = EVENT_TYPES.find(function(t) { return t.value === s.type; });
  const icon    = iconObj ? iconObj.label : s.type;
  let html = 'Here\'s what I\'ll add:<div class="preview-card">';
  html += '<div class="preview-row"><span class="preview-label">Type</span><span class="preview-val">' + icon + '</span></div>';
  html += '<div class="preview-row"><span class="preview-label">Name</span><span class="preview-val">' + s.label + '</span></div>';
  html += '<div class="preview-row"><span class="preview-label">Day</span><span class="preview-val">' + s.day.short + '</span></div>';
  if (s.time)    html += '<div class="preview-row"><span class="preview-label">Time</span><span class="preview-val">' + s.time + '</span></div>';
  if (s.details) html += '<div class="preview-row"><span class="preview-label">Details</span><span class="preview-val">' + s.details + '</span></div>';
  if (s.confirm) html += '<div class="preview-row"><span class="preview-label">Confirm #</span><span class="preview-val">' + s.confirm + '</span></div>';
  html += '</div>';
  await botSay(html);
  showQuickReplies([
    { label: '✅ Add it',     value: 'yes' },
    { label: '↩ Start over', value: 'no' }
  ]);
}

// ── Build event line ───────────────────────────────────
function buildEventLine() {
  let detail = '';
  if (s.time)    detail += s.time;
  if (s.details) detail += (detail ? ' · ' : '') + s.details;
  const parts = [s.label];
  if (detail)    parts.push(detail);
  if (s.confirm) parts.push('confirm: ' + s.confirm);
  return s.type + ': ' + parts.join(' | ');
}

// ── Save (add) ─────────────────────────────────────────
async function saveEvent() {
  hideInputs();
  await botSay('Saving…', 200);

  const newLine = buildEventLine();
  const lines   = s.tripContent.split('\n');

  let insertAt = s.dayLineIndex + 1;
  for (let i = s.dayLineIndex + 1; i < lines.length; i++) {
    const l = lines[i].trim();
    if (/^(DAY|PHASE|TITLE|SUBTITLE|STAT):/.test(l)) break;
    if (l && l !== '---') insertAt = i + 1;
  }

  lines.splice(insertAt, 0, newLine);
  const newContent = lines.join('\n');
  const ok = await pushFile(newContent);
  if (ok) {
    systemMsg('✅ Saved! Site will update in about 30 seconds.');
    s.tripContent = newContent;
    parseDays();
    s.step = 'SELECT_ACTION';
    await botSay('Done! Want to do anything else?');
    showQuickReplies([
      { label: 'Add another event', value: 'add' },
      { label: 'Remove an event',   value: 'remove' }
    ]);
  }
}

// ── Remove ─────────────────────────────────────────────
async function removeEvent() {
  hideInputs();
  await botSay('Removing…', 200);

  const lines      = s.tripContent.split('\n');
  lines.splice(s.removeLineIndex, 1);
  const newContent = lines.join('\n');
  const ok         = await pushFile(newContent);
  if (ok) {
    systemMsg('✅ Removed! Site will update in about 30 seconds.');
    s.tripContent = newContent;
    parseDays();
    s.step = 'SELECT_ACTION';
    await botSay('Done! Anything else?');
    showQuickReplies([
      { label: 'Add an event',    value: 'add' },
      { label: 'Remove an event', value: 'remove' }
    ]);
  }
}

// ── GitHub push ────────────────────────────────────────
async function pushFile(content) {
  try {
    const encoded = btoa(unescape(encodeURIComponent(content)));
    const res = await fetch(
      API + '/repos/' + REPO + '/contents/' + s.tripFile,
      {
        method: 'PUT',
        headers: {
          Authorization:  'token ' + getToken(),
          Accept:         'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'Update ' + s.trip + ' via Trip Editor',
          content: encoded,
          sha:     s.tripSha
        })
      }
    );
    if (!res.ok) {
      const err = await res.json();
      systemMsg('Save failed: ' + err.message, true);
      return false;
    }
    const data = await res.json();
    s.tripSha  = data.content.sha;
    return true;
  } catch (e) {
    systemMsg('Network error: ' + e.message, true);
    return false;
  }
}

// ── Init ───────────────────────────────────────────────
window.addEventListener('load', function() {
  if (localStorage.getItem('gh_auth') === 'true' && getToken()) showChat();

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('token-input').focus();
  });
  document.getElementById('token-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  const inp = document.getElementById('chat-input');
  inp.addEventListener('input', function() {
    inp.style.height = '';
    inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
});
</script>
