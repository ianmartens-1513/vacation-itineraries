<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Trip Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .trip-pill {
      font-size: 12px; color: #3a8fbf;
      background: #1a2535; border: 1px solid #3a8fbf;
      border-radius: 12px; padding: 3px 10px;
      display: none;
    }
    .logout-btn {
      font-size: 13px; color: #666;
      background: none; border: none; cursor: pointer; padding: 4px 8px;
    }

    /* ── Login ── */
    #login-screen {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .login-card {
      background: #1a1a1a; border-radius: 16px;
      padding: 32px 24px; width: 100%; max-width: 400px;
    }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: #888; margin-bottom: 24px; }
    .field-label { font-size: 13px; color: #aaa; margin-bottom: 6px; display: block; }
    .field-input {
      width: 100%; background: #252525; border: 1px solid #333;
      border-radius: 10px; padding: 12px 14px; color: #e8e8e8;
      font-size: 15px; margin-bottom: 16px; outline: none;
    }
    .field-input:focus { border-color: #3a8fbf; }
    .field-hint { font-size: 12px; color: #555; margin-top: -10px; margin-bottom: 16px; }
    .btn-primary {
      width: 100%; background: #3a8fbf; color: white; border: none;
      border-radius: 10px; padding: 14px; font-size: 16px;
      font-weight: 600; cursor: pointer;
    }
    .login-error { color: #e05555; font-size: 13px; margin-top: 12px; }

    /* ── Chat ── */
    #chat-screen {
      display: none; flex: 1; flex-direction: column; overflow: hidden;
    }

    .messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .msg {
      max-width: 82%; padding: 11px 14px;
      border-radius: 18px; font-size: 15px; line-height: 1.5;
    }
    .msg-bot {
      background: #1e1e1e; border: 1px solid #2a2a2a;
      align-self: flex-start; border-bottom-left-radius: 4px;
    }
    .msg-user {
      background: #1a3a5c; align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg-system {
      background: #1a2a1a; border: 1px solid #2a4a2a;
      align-self: center; text-align: center; font-size: 13px;
      color: #6ab86a; border-radius: 10px; max-width: 90%;
      padding: 8px 14px;
    }
    .msg-error {
      background: #2a1a1a; border: 1px solid #5a2a2a;
      align-self: center; text-align: center; font-size: 13px;
      color: #e05555; border-radius: 10px; max-width: 90%;
      padding: 8px 14px;
    }

    /* ── Quick replies ── */
    .quick-replies {
      padding: 6px 14px 4px; display: flex;
      flex-wrap: wrap; gap: 8px; flex-shrink: 0;
    }
    .qr-btn {
      background: #1a2535; border: 1px solid #3a8fbf;
      color: #3a8fbf; border-radius: 20px; padding: 8px 16px;
      font-size: 14px; cursor: pointer; white-space: nowrap;
    }
    .qr-btn:active { background: #2a4a6a; }

    /* ── Input ── */
    .input-area {
      padding: 8px 12px 16px; display: flex;
      gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .chat-input {
      flex: 1; background: #1a1a1a; border: 1px solid #333;
      border-radius: 20px; padding: 10px 16px; color: #e8e8e8;
      font-size: 15px; outline: none; resize: none;
      max-height: 120px; line-height: 1.4; font-family: inherit;
    }
    .chat-input:focus { border-color: #3a8fbf; }
    .send-btn {
      background: #3a8fbf; border: none; border-radius: 50%;
      width: 40px; height: 40px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; flex-shrink: 0;
    }
    .send-btn:disabled { background: #2a2a2a; cursor: default; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ── Attach ── */
    .attach-btn {
      background: none; border: none; color: #666; cursor: pointer;
      font-size: 20px; padding: 0 4px; flex-shrink: 0;
      line-height: 40px; height: 40px; display: flex; align-items: center;
    }
    .attach-btn:hover { color: #3a8fbf; }

    .file-preview {
      padding: 6px 14px 0; display: flex; flex-wrap: wrap;
      gap: 8px; flex-shrink: 0;
    }
    .file-preview-item {
      display: flex; align-items: center; gap: 6px;
      background: #1a2535; border: 1px solid #3a8fbf;
      border-radius: 10px; padding: 5px 10px; font-size: 13px;
      color: #3a8fbf; max-width: 240px;
    }
    .file-preview-thumb {
      width: 32px; height: 32px; object-fit: cover;
      border-radius: 4px; flex-shrink: 0;
    }
    .file-preview-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .file-remove-btn {
      background: none; border: none; color: #888; cursor: pointer;
      font-size: 16px; padding: 0; line-height: 1; flex-shrink: 0;
    }
    .file-remove-btn:hover { color: #e05555; }

    /* ── Typing ── */
    .typing { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
    .typing span {
      width: 7px; height: 7px; background: #555; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">✈️ Trip Editor</span>
  <div class="header-right">
    <span class="trip-pill" id="trip-pill"></span>
    <button class="logout-btn" onclick="doLogout()">Log out</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">Martens Trips</div>
    <div class="login-sub">Sign in to update the itinerary</div>

    <label class="field-label">Password</label>
    <input class="field-input" type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">

    <label class="field-label">GitHub Token</label>
    <input class="field-input" type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">

    <label class="field-label">Anthropic API Key</label>
    <input class="field-input" type="password" id="claude-input" placeholder="sk-ant-xxxxxxxxxxxx" autocomplete="off">
    <div class="field-hint">All credentials stored on this device only — never sent to anyone but GitHub &amp; Anthropic</div>

    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="messages" id="messages"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="file-preview" id="file-preview"></div>
  <div class="input-area">
    <input type="file" id="file-input" accept="image/*,.pdf" style="display:none" onchange="handleFileSelect(this)">
    <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach image or PDF">📎</button>
    <textarea class="chat-input" id="chat-input" placeholder="Type here, or attach a file..." rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendText()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const REPO = 'ianmartens-1513/vacation-itineraries';
const GH_API = 'https://api.github.com';
const PW = 'Martens2026';

const TRIPS = {
  'Montana 2026': 'data/montana-2026.txt',
  'Greece 2026':  'data/greece-2026.txt'
};

// ── Credentials ────────────────────────────────────────
function getGHToken()     { return localStorage.getItem('gh_token') || ''; }
function getClaudeKey()   { return localStorage.getItem('claude_key') || ''; }

function doLogin() {
  const pw     = document.getElementById('pw-input').value.trim();
  const ghTok  = document.getElementById('token-input').value.trim();
  const claude = document.getElementById('claude-input').value.trim();
  const err    = document.getElementById('login-error');

  if (pw !== PW)    { err.textContent = 'Incorrect password.'; return; }
  if (!ghTok)       { err.textContent = 'Please enter your GitHub token.'; return; }
  if (!claude)      { err.textContent = 'Please enter your Anthropic API key.'; return; }

  localStorage.setItem('gh_auth',    'true');
  localStorage.setItem('gh_token',   ghTok);
  localStorage.setItem('claude_key', claude);
  showChat();
}

function doLogout() {
  ['gh_auth','gh_token','claude_key'].forEach(k => localStorage.removeItem(k));
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  ['pw-input','token-input','claude-input'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('login-error').textContent = '';
  document.getElementById('trip-pill').style.display = 'none';
}

// ── State ──────────────────────────────────────────────
let currentTrip    = null;
let currentFile    = null;
let currentContent = null;
let currentSha     = null;
let isThinking     = false;

// ── Chat init ──────────────────────────────────────────
function showChat() {
  document.getElementById('login-screen').style.display = 'none';
  const cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';
  cs.style.flexDirection = 'column';
  clearMessages();
  botSay("Hey! Which trip do you want to edit?");
  showQuickReplies(Object.keys(TRIPS).map(t => ({ label: t, value: t })));
}

// ── UI helpers ─────────────────────────────────────────
function clearMessages() {
  document.getElementById('messages').innerHTML = '';
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function botSay(html, delay) {
  if (delay === undefined) delay = 280;
  return new Promise(function(resolve) {
    const typing = document.createElement('div');
    typing.className = 'msg msg-bot';
    typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    document.getElementById('messages').appendChild(typing);
    scrollBottom();
    setTimeout(function() {
      typing.innerHTML = html;
      scrollBottom();
      resolve();
    }, delay);
  });
}

function userSay(text) {
  const el = document.createElement('div');
  el.className = 'msg msg-user';
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function systemMsg(text, isError) {
  const el = document.createElement('div');
  el.className = isError ? 'msg msg-error' : 'msg msg-system';
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function showQuickReplies(options) {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  options.forEach(function(opt) {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt.label;
    btn.onclick = function() {
      clearQuickReplies();
      userSay(opt.label);
      handleUserInput(opt.value);
    };
    qr.appendChild(btn);
  });
}

function clearQuickReplies() {
  document.getElementById('quick-replies').innerHTML = '';
}

function setInputEnabled(enabled) {
  const inp = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  inp.disabled = !enabled;
  btn.disabled = !enabled;
  isThinking = !enabled;
}

// ── Send text ──────────────────────────────────────────
function sendText() {
  if (isThinking) return;
  const inp  = document.getElementById('chat-input');
  const val  = inp.value.trim();
  const file = pendingFile;
  if (!val && !file) return;
  inp.value = '';
  inp.style.height = '';
  clearQuickReplies();
  if (file) {
    userSay((val || '') + (val ? ' ' : '') + '[📎 ' + file.name + ']');
  } else {
    userSay(val);
  }
  clearFile();
  handleUserInput(val || 'Please read the attached file and add relevant details to the itinerary.', file);
}

// ── Trip selection (before AI takes over) ─────────────
async function handleUserInput(input, file) {
  if (!currentTrip) {
    if (TRIPS[input]) {
      currentTrip = input;
      currentFile = TRIPS[input];
      document.getElementById('trip-pill').textContent = input;
      document.getElementById('trip-pill').style.display = 'inline-block';
      setInputEnabled(false);
      await botSay('Loading ' + input + '…', 180);
      const ok = await loadTrip();
      if (!ok) { setInputEnabled(true); return; }
      resetConversation();
      setInputEnabled(true);
      await botSay('Got it! Tell me what you\'d like to change — add events, remove things, update details, whatever you need.');
    } else {
      await botSay('Which trip — Montana 2026 or Greece 2026?');
      showQuickReplies(Object.keys(TRIPS).map(function(t) { return { label: t, value: t }; }));
    }
    return;
  }

  // Hand off to Claude
  await askClaude(input, file);
}

// ── Load trip from GitHub ──────────────────────────────
async function loadTrip() {
  try {
    const res = await fetch(
      GH_API + '/repos/' + REPO + '/contents/' + currentFile,
      { headers: { Authorization: 'token ' + getGHToken(), Accept: 'application/vnd.github.v3+json' } }
    );
    if (!res.ok) {
      const e = await res.json();
      systemMsg('Load failed: ' + e.message, true);
      return false;
    }
    const data    = await res.json();
    currentSha     = data.sha;
    currentContent = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    return true;
  } catch(e) {
    systemMsg('Network error: ' + e.message, true);
    return false;
  }
}

// ── Push updated file to GitHub ────────────────────────
async function pushFile(newContent, message) {
  try {
    const encoded = btoa(unescape(encodeURIComponent(newContent)));
    const res = await fetch(
      GH_API + '/repos/' + REPO + '/contents/' + currentFile,
      {
        method: 'PUT',
        headers: {
          Authorization:  'token ' + getGHToken(),
          Accept:         'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: message || ('Update ' + currentTrip + ' via Trip Editor'),
          content: encoded,
          sha:     currentSha
        })
      }
    );
    if (!res.ok) {
      const e = await res.json();
      systemMsg('Save failed: ' + e.message, true);
      return false;
    }
    const data = await res.json();
    currentSha = data.content.sha;
    return true;
  } catch(e) {
    systemMsg('Network error: ' + e.message, true);
    return false;
  }
}

// ── File attachment ────────────────────────────────────
let pendingFile = null; // { base64, mediaType, name, isImage }

function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const isImage = file.type.startsWith('image/');
  const isPDF   = file.type === 'application/pdf';
  if (!isImage && !isPDF) { systemMsg('Only images and PDFs are supported.', true); return; }

  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl  = e.target.result;
    const base64   = dataUrl.split(',')[1];
    pendingFile    = { base64: base64, mediaType: file.type, name: file.name, isImage: isImage };
    showFilePreview(file.name, isImage ? dataUrl : null);
  };
  reader.readAsDataURL(file);
}

function showFilePreview(name, thumbSrc) {
  const fp  = document.getElementById('file-preview');
  fp.innerHTML = '';
  const item = document.createElement('div');
  item.className = 'file-preview-item';
  if (thumbSrc) {
    const img = document.createElement('img');
    img.className = 'file-preview-thumb';
    img.src = thumbSrc;
    item.appendChild(img);
  } else {
    const icon = document.createElement('span');
    icon.textContent = '📄';
    item.appendChild(icon);
  }
  const nameEl = document.createElement('span');
  nameEl.className = 'file-preview-name';
  nameEl.textContent = name;
  item.appendChild(nameEl);
  const rm = document.createElement('button');
  rm.className = 'file-remove-btn';
  rm.textContent = '×';
  rm.onclick = clearFile;
  item.appendChild(rm);
  fp.appendChild(item);
}

function clearFile() {
  pendingFile = null;
  document.getElementById('file-preview').innerHTML = '';
}

// ── Conversation history ───────────────────────────────
let conversationHistory = [];

function resetConversation() {
  conversationHistory = [];
}

// ── Ask Claude ─────────────────────────────────────────
async function askClaude(userMessage, file) {
  setInputEnabled(false);

  // Typing indicator
  const typingEl = document.createElement('div');
  typingEl.className = 'msg msg-bot';
  typingEl.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  document.getElementById('messages').appendChild(typingEl);
  scrollBottom();

  const systemPrompt = `You are a helpful travel itinerary assistant for the Martens family. You help edit trip itinerary files.

The current trip is "${currentTrip}". Here is the current itinerary file content:

\`\`\`
${currentContent}
\`\`\`

The file uses a simple line-based format:
- TITLE: / SUBTITLE: — trip header
- STAT: value | label — quick stat shown at the top
- PHASE: num | dates | name | nights | color | description — trip phase
- DAY: month day | weekday — name | location | color | badge — day header
- event lines: type: label | time · details | confirm: XYZ

Event types: flight, hotel, taxi, car, drive, activity, tour, dinner, drinks, coffee, beach, wedding, church, event

Colors: primary, blue, gold, slate, purple, amber

When the user asks to make a change, respond with a JSON object in this exact format:
{
  "action": "update" | "none",
  "reply": "friendly confirmation message to show the user",
  "newContent": "the complete updated file content as a string (only when action is update)"
}

Rules:
- Always return valid JSON, nothing else
- When adding events, insert them in the right place under the correct DAY line
- When removing events, delete just that line
- Keep all existing content intact unless explicitly asked to change it
- For "newContent", include the ENTIRE file with the change applied
- If you're unsure what the user wants, set action to "none" and ask a clarifying question in "reply"
- Never include prices
- Be friendly and conversational in "reply"`;

  try {
    const res = await fetch('https://claude-proxy.iantmartens.workers.dev/', {
      method: 'POST',
      headers: {
        'x-api-key':         getClaudeKey(),
        'anthropic-version': '2023-06-01',
        'content-type':      'application/json'
      },
      body: JSON.stringify({
        model:      'claude-haiku-4-5-20251001',
        max_tokens: 4096,
        system:     systemPrompt,
        messages:   conversationHistory.concat([{
          role: 'user',
          content: file ? (function() {
            var parts = [];
            if (file.isImage) {
              parts.push({ type: 'image', source: { type: 'base64', media_type: file.mediaType, data: file.base64 } });
            } else {
              parts.push({ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: file.base64 } });
            }
            if (userMessage) parts.push({ type: 'text', text: userMessage });
            return parts;
          })() : userMessage
        }])
      })
    });

    if (!res.ok) {
      const e = await res.json();
      typingEl.remove();
      systemMsg('Claude error: ' + (e.error && e.error.message ? e.error.message : res.status), true);
      setInputEnabled(true);
      return;
    }

    const data    = await res.json();
    const rawText = data.content[0].text.trim();

    // Parse JSON response
    let parsed;
    try {
      const jsonStr = rawText.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '').trim();
      parsed = JSON.parse(jsonStr);
    } catch(e) {
      typingEl.innerHTML = rawText;
      conversationHistory.push({ role: 'user',      content: userMessage });
      conversationHistory.push({ role: 'assistant', content: rawText });
      setInputEnabled(true);
      return;
    }

    // Store exchange in history (use reply text so future context stays concise)
    conversationHistory.push({ role: 'user',      content: userMessage });
    conversationHistory.push({ role: 'assistant', content: rawText });

    // Show Claude's reply
    typingEl.innerHTML = parsed.reply || 'Done!';
    scrollBottom();

    // If there's an update, push it
    if (parsed.action === 'update' && parsed.newContent) {
      const ok = await pushFile(parsed.newContent);
      if (ok) {
        currentContent = parsed.newContent;
        systemMsg('✅ Saved! Site updates in ~30 seconds.');
      }
    }

  } catch(e) {
    typingEl.remove();
    systemMsg('Network error: ' + e.message, true);
  }

  setInputEnabled(true);
}

// ── Switch trip ────────────────────────────────────────
async function switchTrip() {
  currentTrip    = null;
  currentFile    = null;
  currentContent = null;
  currentSha     = null;
  document.getElementById('trip-pill').style.display = 'none';
  clearMessages();
  clearQuickReplies();
  await botSay('Which trip do you want to edit?');
  showQuickReplies(Object.keys(TRIPS).map(function(t) { return { label: t, value: t }; }));
}

// ── Init ───────────────────────────────────────────────
window.addEventListener('load', function() {
  if (localStorage.getItem('gh_auth') === 'true' && getGHToken() && getClaudeKey()) {
    showChat();
  }

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('token-input').focus();
  });
  document.getElementById('token-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('claude-input').focus();
  });
  document.getElementById('claude-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  const inp = document.getElementById('chat-input');
  inp.addEventListener('input', function() {
    inp.style.height = '';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
});
</script>
</body>
</html>
